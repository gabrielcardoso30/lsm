name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: shellcheck + bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck and bats-core (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: Install shellcheck, bats-core, GNU coreutils, bash 5 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install shellcheck bats-core coreutils bash
          # Make `bash` resolve to brew's bash 5+ (needed for declare -A).
          echo "$(brew --prefix bash)/bin" >> "$GITHUB_PATH"
          # Prepend coreutils' gnubin so `find` itself is GNU find (lsm needs
          # `find -printf`). This follows brew's own caveat for coreutils.
          echo "$(brew --prefix coreutils)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Print versions
        run: |
          bash --version | head -1
          shellcheck --version | head -2
          bats --version
          if command -v gfind >/dev/null 2>&1; then gfind --version | head -1; else find --version | head -1; fi

      - name: Run shellcheck
        run: shellcheck lsm

      - name: Smoke-run lsm (surfaces real errors before bats)
        run: |
          ./lsm --no-color . 2>&1 | head -30 || true
          ./lsm --no-color --sort name . 2>&1 | tail -10 || true

      - name: Run bats
        run: bats test/
