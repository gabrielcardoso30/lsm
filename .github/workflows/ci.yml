name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: shellcheck + bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck and bats-core (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: Install shellcheck, bats-core, GNU coreutils, bash 5 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install shellcheck bats-core coreutils bash
          # Make `bash` resolve to brew's bash 5+ (needed for declare -A).
          echo "$(brew --prefix bash)/bin" >> "$GITHUB_PATH"
          # Prepend coreutils' gnubin so `find` itself is GNU find (lsm needs
          # `find -printf`). This follows brew's own caveat for coreutils.
          echo "$(brew --prefix coreutils)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Print versions
        run: |
          bash --version | head -1
          shellcheck --version | head -2
          bats --version
          if command -v gfind >/dev/null 2>&1; then gfind --version | head -1; else find --version | head -1; fi

      - name: Run shellcheck
        run: shellcheck lsm

      - name: Diagnose runtime environment
        run: |
          echo "=== bash ==="
          bash --version | head -1
          command -v bash
          echo "=== find ==="
          command -v find
          find --version 2>&1 | head -2 || true
          echo "=== gfind ==="
          command -v gfind 2>&1 || echo "(no gfind in PATH)"
          echo "=== awk ==="
          command -v awk
          awk --version 2>&1 | head -2 || awk -W version 2>&1 | head -2 || true
          echo "=== realpath ==="
          command -v realpath
          realpath --version 2>&1 | head -2 || true
          echo "=== PATH ==="
          echo "$PATH"

      - name: Smoke-run lsm with full output and bash trace
        run: |
          set +e
          echo "=== ./lsm --no-color . (plain) ==="
          ./lsm --no-color . ; rc=$?
          echo "=== exit code: $rc ==="
          if [[ $rc -ne 0 ]]; then
            echo "=== ./lsm --no-color . (bash -x trace, last 80 lines) ==="
            bash -x ./lsm --no-color . 2>&1 | tail -80
            exit 1
          fi

      - name: Run bats
        run: bats test/
